<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Explorer | Mission Control</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Booting up Python Engine...</p>
    </div>

    <header>
        <div class="logo"><span>🚀</span> Python Hero</div>
        <div class="stats-bar">
            <span>Progress:</span>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="badge-shelf"></div>
        </div>
    </header>

    <main>
        <aside class="sidebar" id="mission-list">
            </aside>

        <section class="editor-area">
            <div class="mission-card">
                <h2 id="mission-title">Mission 1</h2>
                <p id="mission-desc">Instructions loading...</p>
            </div>
            
            <div class="code-window">
                <div class="window-header">code_editor.py</div>
                <textarea id="code-editor" spellcheck="false"></textarea>
                <div class="action-bar">
                    <button class="btn btn-run" onclick="runCode()">▶ RUN MISSION</button>
                    <button class="btn btn-hint" onclick="showHint()">💡 NEED A HINT?</button>
                </div>
            </div>
        </section>

        <aside class="console-area">
            <div class="console-header">System Output</div>
            <div id="console-output">Ready for input...</div>
            <div id="celebration-zone"></div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
